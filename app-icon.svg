<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Players Championship Fantasy Draft App Icon</title>
  <desc id="desc">Square navy and gold app icon for the Players Championship fantasy draft tracker.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082845"/>
      <stop offset="100%" stop-color="#0d3b66"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1d487"/>
      <stop offset="100%" stop-color="#c8a24a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="60" y="60" width="392" height="392" rx="84" fill="#0f3151" stroke="#ffffff" stroke-opacity="0.14"/>

  <text x="256" y="155" text-anchor="middle" font-family="'Spectral', Georgia, serif" font-size="34" fill="#f6efdf" letter-spacing="8">THE</text>
  <text x="256" y="240" text-anchor="middle" font-family="'Spectral', Georgia, serif" font-size="90" font-weight="700" fill="url(#gold)" letter-spacing="2">PLAYERS</text>
  <text x="256" y="300" text-anchor="middle" font-family="'Spectral', Georgia, serif" font-size="28" fill="#f6efdf" letter-spacing="6">CHAMPIONSHIP</text>
  <text x="256" y="362" text-anchor="middle" font-family="'Space Grotesk', Arial, sans-serif" font-size="26" fill="#dbe6f3" letter-spacing="3">FANTASY DRAFT</text>
</svg>
