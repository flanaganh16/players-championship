<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Players Championship Fantasy Draft</title>
  <desc id="desc">Small navy and gold share card for the Players Championship fantasy draft app.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#082845"/>
      <stop offset="100%" stop-color="#0d3b66"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1d487"/>
      <stop offset="100%" stop-color="#c8a24a"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bg)"/>
  <circle cx="1040" cy="126" r="150" fill="#ffffff" opacity="0.05"/>
  <circle cx="138" cy="548" r="180" fill="#ffffff" opacity="0.04"/>

