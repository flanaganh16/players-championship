services:
  - type: web
    name: players-championship-fantasy
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: STATE_DB_PATH
        value: /var/data/game-state.db
      - key: SPORTSDATAIO_API_KEY
        sync: false
      - key: SPORTSDATAIO_SEASON
        value: 2026
      - key: SPORTSDATAIO_TOURNAMENT_SEARCH
        value: Players Championship
      - key: SPORTSDATAIO_BASE_URL
        value: https://api.sportsdata.io/golf/v2
      - key: SPORTSDATAIO_TOURNAMENTS_PATHS
        value: NONE
      - key: SPORTSDATAIO_LEADERBOARD_PATHS
        value: /json/Leaderboard/{tournamentId},/json/LeaderboardBasic/{tournamentId},/json/PlayerTournamentRoundScores/{tournamentId},/json/PlayerTournamentScores/{tournamentId}
    disk:
      name: fantasy-state
      mountPath: /var/data
      sizeGB: 1
